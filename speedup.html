<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D365 SpeedUp</title>
  <link href="libs/prism/prism-tomorrow.min.css" rel="stylesheet">
<script src="libs/prism/prism.min.js"></script>
<script src="libs/prism/prism-csharp.min.js"></script>
<script src="libs/prism/prism-javascript.min.js"></script>
<script src="libs/prism/prism-xml-doc.min.js"></script>
  <link rel="stylesheet" href="style.css" />

</head>
<body>
  <div class="app-container">
    <div class="overlay" id="overlay"></div>

    <!-- Burger Menu -->
    <button class="burger-menu" id="burgerMenu">
      <span class="burger-line"></span>
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </button>

    <!-- Burger hint callout (shown briefly when no favorites) -->
    <div class="burger-hint hidden" id="burgerHint">Click here to get started</div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
  
      <nav class="sidebar-nav" id="navContainer">
        <!-- Sidebar items injected dynamically by popup.js -->
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <div class="topbar">
        <div class="topbar-left"  id="topbarHome">
          <img src="assets/icon48.png" alt="logo" width="22" height="22" />
          <span class="topbar-title">D365 SpeedUp</span>
          <button class="panel-toggle-btn" id="panelToggleBtn" title="Switch to Side Panel">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="14" height="14" rx="2" stroke="#aaa" stroke-width="1.4"/>
              <rect x="10" y="1" width="5" height="14" fill="#aaa" opacity="0.4"/>
            </svg>
          </button>

        </div>
        <h1 class="content-title hidden" id="contentTitle"></h1>       
      </div>

  <!-- Top Navigation Tabs -->
  <div class="main-tabs" id="mainTabs">
    <div class="main-tab active" data-tab="favorites">Favorites</div>
    <div class="main-tab" data-tab="quick">Quick Links</div>
    <div class="main-tab" data-tab="info">Info</div>
  </div>

      <div class="content-body" id="contentBody">
 
        <div class="content-card" id="contentArea">
          <div class="empty-state">
            <div class="empty-state-icon">⚡</div>
            <p>Select a menu item from the sidebar</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="dist/speedup.js"></script>
  
</body>
</html>
